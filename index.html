<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriTrack Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
    padding:40px 0;
}

h1{
    text-align:center;
    margin-bottom:10px;
    color:#22c55e;
    font-size:40px;
}

.subtitle{
    text-align:center;
    color:#94a3b8;
    margin-bottom:40px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
}

.card{
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.card h2{
    margin-bottom:20px;
    color:#22c55e;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
    background:#334155;
    color:white;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#16a34a;
}

.result{
    margin-top:20px;
    background:#334155;
    padding:20px;
    border-radius:15px;
}

.food-card{
    background:#334155;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
}

.food-card p{
    margin:8px 0;
}

.dashboard{
    margin-top:40px;
}

.dashboard h2{
    color:#22c55e;
    margin-bottom:20px;
}

.totals{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
}

.total-box{
    background:#1e293b;
    padding:25px;
    border-radius:15px;
    text-align:center;
}

.total-box h3{
    color:#94a3b8;
    font-size:14px;
}

.total-box p{
    margin-top:10px;
    font-size:28px;
    font-weight:bold;
    color:#22c55e;
}

@media(max-width:900px){
    .grid{
        grid-template-columns:1fr;
    }

    .totals{
        grid-template-columns:1fr 1fr;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>NutriTrack Pro</h1>
<p class="subtitle">
BMI Calculator & Global Nutrition Tracker
</p>

<div class="grid">

<div class="card">
<h2>BMI Calculator</h2>

<input type="number" id="height" placeholder="Height (cm)">
<input type="number" id="weight" placeholder="Weight (kg)">

<button onclick="calculateBMI()">
Calculate BMI
</button>

<div id="bmiResult"></div>

</div>

<div class="card">
<h2>Food Search</h2>

<input type="text"
id="foodName"
placeholder="Search any food...">

<button onclick="searchFood()">
Search Food
</button>

<div id="foodResult"></div>

</div>

</div>

<div class="dashboard">

<h2>Today's Nutrition Intake</h2>

<div class="totals">

<div class="total-box">
<h3>Calories</h3>
<p id="totalCalories">0</p>
</div>

<div class="total-box">
<h3>Protein</h3>
<p id="totalProtein">0g</p>
</div>

<div class="total-box">
<h3>Carbs</h3>
<p id="totalCarbs">0g</p>
</div>

<div class="total-box">
<h3>Fat</h3>
<p id="totalFat">0g</p>
</div>

</div>

</div>

</div>

<script>

let totalCalories = 0;
let totalProtein = 0;
let totalCarbs = 0;
let totalFat = 0;

function calculateBMI(){

    const height =
    document.getElementById('height').value;

    const weight =
    document.getElementById('weight').value;

    if(!height || !weight){
        return;
    }

    const bmi =
    weight / ((height/100)*(height/100));

    let category = '';

    if(bmi < 18.5)
        category = 'Underweight';
    else if(bmi < 25)
        category = 'Normal';
    else if(bmi < 30)
        category = 'Overweight';
    else
        category = 'Obese';

    document.getElementById('bmiResult').innerHTML =
    `
    <div class="result">
        <h3>BMI : ${bmi.toFixed(1)}</h3>
        <p>${category}</p>
    </div>
    `;
}

async function searchFood(){

    const food =
    document.getElementById('foodName').value;

    if(!food) return;

    const apiKey =
    "YOUR_USDA_API_KEY";

    const url =
    `https://api.nal.usda.gov/fdc/v1/foods/search?query=${food}&api_key=${apiKey}`;

    try{

        const response =
        await fetch(url);

        const data =
        await response.json();

        if(data.foods.length === 0){

            document.getElementById('foodResult').innerHTML =
            '<div class="result">Food not found.</div>';

            return;
        }

        const item =
        data.foods[0];

        let calories = 0;
        let protein = 0;
        let carbs = 0;
        let fat = 0;

        item.foodNutrients.forEach(n=>{

            if(n.nutrientName === 'Energy')
                calories = n.value;

            if(n.nutrientName === 'Protein')
                protein = n.value;

            if(n.nutrientName === 'Carbohydrate, by difference')
                carbs = n.value;

            if(n.nutrientName === 'Total lipid (fat)')
                fat = n.value;

        });

        document.getElementById('foodResult').innerHTML =
        `
        <div class="food-card">

            <h3>${item.description}</h3>

            <p>Calories: ${calories} kcal</p>
            <p>Protein: ${protein} g</p>
            <p>Carbs: ${carbs} g</p>
            <p>Fat: ${fat} g</p>

            <button onclick="
            addFood(
            ${calories},
            ${protein},
            ${carbs},
            ${fat}
            )">

            Add To Daily Intake

            </button>

        </div>
        `;

    }
    catch(error){

        document.getElementById('foodResult').innerHTML =
        '<div class="result">Error fetching data.</div>';

        console.log(error);
    }
}

function addFood(
    calories,
    protein,
    carbs,
    fat
){

    totalCalories += Number(calories);
    totalProtein += Number(protein);
    totalCarbs += Number(carbs);
    totalFat += Number(fat);

    document.getElementById('totalCalories').innerHTML =
    totalCalories.toFixed(0);

    document.getElementById('totalProtein').innerHTML =
    totalProtein.toFixed(1)+'g';

    document.getElementById('totalCarbs').innerHTML =
    totalCarbs.toFixed(1)+'g';

    document.getElementById('totalFat').innerHTML =
    totalFat.toFixed(1)+'g';

    localStorage.setItem(
        'nutritionTotals',
        JSON.stringify({
            calories:totalCalories,
            protein:totalProtein,
            carbs:totalCarbs,
            fat:totalFat
        })
    );
}

window.onload = function(){

    const saved =
    JSON.parse(
        localStorage.getItem(
            'nutritionTotals'
        )
    );

    if(saved){

        totalCalories =
        saved.calories;

        totalProtein =
        saved.protein;

        totalCarbs =
        saved.carbs;

        totalFat =
        saved.fat;

        document.getElementById('totalCalories').innerHTML =
        totalCalories;

        document.getElementById('totalProtein').innerHTML =
        totalProtein.toFixed(1)+'g';

        document.getElementById('totalCarbs').innerHTML =
        totalCarbs.toFixed(1)+'g';

        document.getElementById('totalFat').innerHTML =
        totalFat.toFixed(1)+'g';
    }
}

</script>

</body>
</html>
